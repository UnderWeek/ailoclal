<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI HUB 192</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root { --accent: #10a37f; --bg: #050505; }
        body { background-color: var(--bg); color: #e5e5e5; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-header { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid #222; }
        .chat-bubble-user { background: #222; border-radius: 20px 20px 4px 20px; padding: 12px 16px; align-self: flex-end; max-width: 85%; }
        .chat-bubble-ai { border-bottom: 1px solid #111; padding: 24px 4px; width: 100%; }
        pre { background: #000 !important; border-radius: 12px; padding: 14px; margin: 12px 0; border: 1px solid #333; overflow-x: auto; }
        code { font-family: 'SF Mono', monospace; font-size: 0.85em; }
        select { background: #111; border: 1px solid #333; color: white; border-radius: 12px; padding: 10px; width: 100%; outline: none; appearance: none; }
        .welcome-screen { backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); background: rgba(0,0,0,0.8); }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="setupOverlay" class="hidden fixed inset-0 z-[100] welcome-screen flex items-center justify-center p-6">
        <div class="bg-[#111] w-full max-w-sm rounded-[32px] p-8 border border-[#333] shadow-2xl">
            <div class="w-16 h-16 bg-[#10a37f] rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-[#10a37f]/20">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h2 class="text-3xl font-bold mb-2 tracking-tight">AI HUB <span class="text-[#10a37f]">192</span></h2>
            <p class="text-gray-400 text-sm mb-8">Для начала работы вставь свой API ключ от <b>llmapi.ai</b>. Мы сохраним его только в твоем браузере.</p>
            <input type="password" id="initialApiKey" placeholder="sk-..." class="w-full p-4 bg-black rounded-2xl border border-[#333] mb-4 outline-none focus:border-[#10a37f] text-white">
            <button onclick="firstTimeSave()" class="w-full bg-[#10a37f] p-4 rounded-2xl font-bold text-white active:scale-95 transition">Запустить Хаб</button>
        </div>
    </div>

    <header class="glass-header fixed top-0 w-full z-50 pt-12 pb-4 px-4">
        <div class="max-w-4xl mx-auto space-y-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-[#10a37f] animate-pulse"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Live Connection</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="clearHistory()" class="text-[10px] font-bold text-red-500 uppercase border border-red-500/20 px-2 py-1 rounded">Reset</button>
                    <button onclick="openSettings()" class="text-lg">⚙️</button>
                </div>
            </div>
            <select id="modelSelect" onchange="updateModel()"></select>
        </div>
    </header>

    <main id="chatDisplay" class="flex-1 overflow-y-auto p-4 space-y-8 pt-48 pb-32 flex flex-col"></main>

    <footer class="fixed bottom-0 w-full p-4 pb-10 bg-gradient-to-t from-[#050505] via-[#050505] to-transparent">
        <div class="max-w-4xl mx-auto flex items-end gap-3 bg-[#151515] p-2 rounded-[24px] border border-[#222] shadow-2xl">
            <textarea id="userInput" rows="1" placeholder="Спроси что угодно..." 
                class="flex-1 p-3 bg-transparent outline-none resize-none text-base text-white"
                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            <button onclick="handleSend()" id="sendBtn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center active:scale-90 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 12 7-7 7 7M12 19V5"/></svg>
            </button>
        </div>
    </footer>

    <script>
        // --- БАЗА МОДЕЛЕЙ (192 шт) ---
        const models = [
            {v: "OpenAI", m: ["gpt-5", "gpt-5-pro", "gpt-5.2", "gpt-5.2-pro", "gpt-5-nano", "gpt-5-mini", "o3-mini", "o1", "gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "gpt-5.1-codex", "gpt-3.5-turbo"]},
            {v: "Anthropic", m: ["claude-3-7-sonnet", "claude-sonnet-4.6", "claude-sonnet-4.5", "claude-opus-4.6", "claude-3-5-sonnet", "claude-3-opus", "claude-3-haiku"]},
            {v: "Google", m: ["gemini-3-pro", "gemini-3-flash", "gemini-2.5-pro", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-pro"]},
            {v: "DeepSeek", m: ["deepseek-v3.2", "deepseek-v3", "deepseek-r1-distill-llama-70b"]},
            {v: "Qwen", m: ["qwen3-max", "qwen3-32b", "qwen3-coder-plus", "qwen2.5-72b", "qwen-qwq-32b", "qwen-omni-turbo"]},
            {v: "Meta/Llama", m: ["llama-4-maverick-17b", "llama-4-scout-17b", "llama-3.3-70b", "llama-3.1-405b"]},
            {v: "xAI", m: ["grok-4", "grok-3", "grok-3-mini"]},
            {v: "GLM", m: ["glm-5", "glm-4.7", "glm-4.7-flash"]}
        ];

        // Заполняем селект
        const select = document.getElementById('modelSelect');
        models.forEach(vendor => {
            const group = document.createElement('optgroup');
            group.label = vendor.v;
            vendor.m.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                group.appendChild(opt);
            });
            select.appendChild(group);
        });

        // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
        let chatHistory = JSON.parse(localStorage.getItem('ai_hub_history') || '[]');
        
        function init() {
            const key = localStorage.getItem('ai_hub_key');
            if (!key) {
                document.getElementById('setupOverlay').classList.remove('hidden');
            } else {
                if (localStorage.getItem('ai_hub_model')) {
                    select.value = localStorage.getItem('ai_hub_model');
                }
                chatHistory.forEach(msg => renderMessage(msg.role, msg.content));
            }
        }

        function firstTimeSave() {
            const key = document.getElementById('initialApiKey').value;
            if (key.startsWith('sk-')) {
                localStorage.setItem('ai_hub_key', key);
                document.getElementById('setupOverlay').classList.add('hidden');
            } else {
                alert("Пожалуйста, введи корректный ключ (начинается с sk-)");
            }
        }

        function openSettings() {
            const newKey = prompt("Введи новый API Key:", localStorage.getItem('ai_hub_key'));
            if (newKey) localStorage.setItem('ai_hub_key', newKey);
        }

        function updateModel() {
            localStorage.setItem('ai_hub_model', select.value);
        }

        function clearHistory() {
            if (confirm("Очистить историю?")) {
                chatHistory = [];
                localStorage.removeItem('ai_hub_history');
                document.getElementById('chatDisplay').innerHTML = '';
            }
        }

        function renderMessage(role, text) {
            const display = document.getElementById('chatDisplay');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai';
            
            if (role === 'ai') {
                div.innerHTML = `<div class="prose prose-invert max-w-full text-gray-200 text-sm leading-relaxed">${marked.parse(text)}</div>`;
                div.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
            } else {
                div.innerText = text;
            }
            display.appendChild(div);
            display.scrollTo({ top: display.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const key = localStorage.getItem('ai_hub_key');
            if (!input.value.trim()) return;

            const text = input.value;
            input.value = '';
            input.style.height = '';

            renderMessage('user', text);
            chatHistory.push({ role: "user", content: text });
            
            try {
                const response = await fetch('https://api.llmapi.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: select.value,
                        messages: chatHistory.slice(-10)
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                renderMessage('ai', aiMsg);
                chatHistory.push({ role: "assistant", content: aiMsg });
                localStorage.setItem('ai_hub_history', JSON.stringify(chatHistory));
            } catch (e) {
                renderMessage('ai', '❌ Ошибка подключения. Проверь ключ.');
            }
        }

        init();
    </script>
</body>
</html>
