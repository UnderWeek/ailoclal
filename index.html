<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nano AI Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root { --ios-blue: #007aff; }
        body { 
            background-color: #f2f2f7; 
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Стилизация Markdown вывода */
        .prose pre { background: #1e1e1e; border-radius: 12px; padding: 10px; overflow-x: auto; margin: 8px 0; }
        .prose code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.85em; }
        .prose p { margin-bottom: 8px; }
        .prose ul { list-style-type: disc; margin-left: 20px; }
        
        .bubble-user { background: var(--ios-blue); color: white; border-radius: 20px 20px 4px 20px; }
        .bubble-ai { background: white; color: black; border-radius: 20px 20px 20px 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Blur эффект для хедера */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* Кастомный скроллбар */
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="glass border-b p-4 pt-12 flex justify-between items-center sticky top-0 z-30">
        <div>
            <h1 class="text-xl font-bold tracking-tight">GPT-5 Nano</h1>
            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Secure Local Auth</p>
        </div>
        <button onclick="toggleSettings()" class="bg-gray-200/50 p-2 rounded-full px-4 text-sm font-medium">⚙️</button>
    </header>

    <main id="chat" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32 pt-6"></main>

    <div id="settings" class="hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-8 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Настройки</h2>
                <button onclick="toggleSettings()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <label class="block text-sm font-bold text-gray-600 mb-2">API KEY (llmapi.ai)</label>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none focus:ring-2 ring-blue-500 mb-6">
            <button onclick="saveSettings()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200">Сохранить и закрыть</button>
            <p class="text-center text-xs text-gray-400 mt-4">Ключ хранится только в браузере твоего iPhone</p>
        </div>
    </div>

    <footer class="glass border-t p-4 pb-10 fixed bottom-0 w-full z-30">
        <div class="max-w-4xl mx-auto flex gap-3 items-end">
            <textarea id="userInput" rows="1" placeholder="Сообщение..." 
                class="flex-1 p-3 bg-gray-200/50 rounded-2xl outline-none text-base resize-none"
                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            <button onclick="sendMessage()" id="sendBtn" 
                class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
    </footer>

    <script>
        let chatHistory = [];

        function toggleSettings() { document.getElementById('settings').classList.toggle('hidden'); }

        function saveSettings() {
            localStorage.setItem('nano_api_key', document.getElementById('apiKey').value);
            toggleSettings();
        }

        function appendMessage(role, text) {
            const chat = document.getElementById('chat');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-4 shadow-sm prose ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;
            
            // Рендерим Markdown для AI, обычный текст для юзера
            if (role === 'ai') {
                div.innerHTML = marked.parse(text);
                div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
            } else {
                div.innerText = text;
            }

            wrapper.appendChild(div);
            chat.appendChild(wrapper);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const key = localStorage.getItem('nano_api_key');
            
            if (!key) return toggleSettings();
            if (!input.value.trim()) return;

            const text = input.value;
            input.value = '';
            input.style.height = '';
            
            appendMessage('user', text);
            chatHistory.push({ role: "user", content: text });

            // Ограничение контекста (храним 15 сообщений)
            if (chatHistory.length > 15) chatHistory.shift();

            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                const response = await fetch('https://api.llmapi.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: "gpt-5-nano",
                        messages: chatHistory,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                appendMessage('ai', aiResponse);
                chatHistory.push({ role: "assistant", content: aiResponse });
            } catch (e) {
                appendMessage('ai', '**Ошибка:** Не удалось связаться с API. Проверь ключ в настройках.');
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // Автозаполнение ключа
        if (localStorage.getItem('nano_api_key')) {
            document.getElementById('apiKey').value = localStorage.getItem('nano_api_key');
        }
    </script>
</body>
</html>
